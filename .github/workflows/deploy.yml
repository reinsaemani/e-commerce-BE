name: Docker CI/CD

on:
  push:
    branches: ["main"]
    tags:
      - "v*"
  workflow_dispatch:

env:
  IMAGE: ${{ secrets.DOCKER_USERNAME }}/ecommerce-backend

# =========================
# BUILD (main branch)
# =========================
jobs:
  build:
    if: github.ref_type != 'tag'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.prod
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # =========================
  # RELEASE (tag versioning)
  # =========================
  release:
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest

    steps:
      - name: Login Docker
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Pull latest image
        run: docker pull ${{ env.IMAGE }}:latest

      - name: Tag version
        run: docker tag ${{ env.IMAGE }}:latest ${{ env.IMAGE }}:${{ github.ref_name }}

      - name: Push version
        run: docker push ${{ env.IMAGE }}:${{ github.ref_name }}

  # =========================
  # DEPLOY (VPS)
  # =========================
  deploy:
  if: github.ref_type == 'tag'
  needs: release
  runs-on: ubuntu-latest

  steps:
    - name: Deploy to VPS
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_SSH_KEY }}
        script: |
          set -e

          cd ~/e-commerce-BE

          export IMAGE=${{ secrets.DOCKER_USERNAME }}/ecommerce-backend:${{ github.ref_name }}

          docker-compose -f docker-compose.prod.yml down
          docker-compose -f docker-compose.prod.yml pull
          docker-compose -f docker-compose.prod.yml up -d

          sleep 10

          docker exec e-commerce-backend pnpm prisma migrate deploy

          docker ps
