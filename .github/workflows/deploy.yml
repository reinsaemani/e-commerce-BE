name: Kubernetes CI/CD

on:
  push:
    branches: ["main"]
    tags:
      - "v*"
  workflow_dispatch:

env:
  IMAGE: ${{ secrets.DOCKER_USERNAME }}/ecommerce-backend

jobs:

# =========================
# BUILD IMAGE
# =========================
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.prod
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

# =========================
# DEPLOY STAGING (MAIN)
# =========================
  deploy-staging:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Set kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config

      - name: Create Namespace
        run: kubectl apply -f k8s/staging/namespace.yaml

      - name: Apply Staging
        run: kubectl apply -f k8s/staging/

      - name: Update Image
        run: |
          kubectl set image deployment/backend backend=${{ env.IMAGE }}:latest -n staging
          kubectl rollout status deployment/backend -n staging --timeout=180s

# =========================
# DEPLOY PROD (TAG v*)
# =========================
  deploy-prod:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Set kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config

      - name: Create Namespace
        run: kubectl apply -f k8s/prod/namespace.yaml

      - name: Apply Prod
        run: kubectl apply -f k8s/prod/

      - name: Update Image (TAG VERSION)
        run: |
          kubectl set image deployment/backend backend=${{ env.IMAGE }}:${{ github.ref_name }} -n prod
          kubectl rollout status deployment/backend -n prod --timeout=180s