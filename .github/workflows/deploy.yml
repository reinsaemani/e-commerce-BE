name: Kubernetes CI/CD

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  release:
    types: [created]

env:
  IMAGE: ${{ secrets.DOCKER_USERNAME }}/ecommerce-backend

jobs:

# =========================
# BUILD IMAGE
# =========================
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.prod
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

# =========================
# DEPLOY TO STAGING
# =========================
  deploy-staging:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config

      # =========================
      # FIX: CREATE NAMESPACE FIRST
      # =========================
      - name: Create Namespace (STAGING)
        run: |
          kubectl apply -f k8s/staging/namespace.yaml

      # =========================
      # APPLY RESOURCES SAFELY
      # =========================
      - name: Deploy STAGING (Infra)
        run: |
          kubectl apply -f k8s/staging/mysql/
          kubectl apply -f k8s/staging/

      - name: Update Backend Image
        run: |
          kubectl set image deployment/backend backend=${{ env.IMAGE }}:latest -n staging
          kubectl rollout status deployment/backend -n staging

      - name: Wait Backend Ready
        run: |
          kubectl rollout status deployment/backend -n staging --timeout=120s

      - name: Prisma Migrate (STAGING)
        run: |
          kubectl exec deploy/backend -n staging -- sh -c "pnpm prisma migrate deploy"

# =========================
# DEPLOY TO PROD
# =========================
  deploy-prod:
    if: github.event_name == 'release'
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config

      # =========================
      # FIX: CREATE NAMESPACE FIRST
      # =========================
      - name: Create Namespace (PROD)
        run: |
          kubectl apply -f k8s/prod/namespace.yaml

      - name: Deploy PROD (Infra)
        run: |
          kubectl apply -f k8s/prod/mysql/
          kubectl apply -f k8s/prod/

      - name: Update Backend Image
        run: |
          kubectl set image deployment/backend backend=${{ env.IMAGE }}:latest -n prod
          kubectl rollout status deployment/backend -n prod

      - name: Wait Backend Ready
        run: |
          kubectl rollout status deployment/backend -n prod --timeout=120s

      - name: Prisma Migrate (PROD)
        run: |
          kubectl exec deploy/backend -n prod -- sh -c "pnpm prisma migrate deploy"