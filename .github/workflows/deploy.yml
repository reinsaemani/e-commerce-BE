name: Docker CI/CD

on:
  push:
    branches: ["main"]
    tags:
      - "v*"
  workflow_dispatch:

env:
  IMAGE: ${{ secrets.DOCKER_USERNAME }}/ecommerce-backend

# =========================
# BUILD (non-tag push)
# =========================
jobs:
  build:
    if: github.ref_type != 'tag'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push
        run: |
          docker build \
            -t $IMAGE:latest \
            -t $IMAGE:${{ github.sha }} \
            -f Dockerfile.prod .

          docker push $IMAGE:latest
          docker push $IMAGE:${{ github.sha }}

  # =========================
  # RELEASE (tag versioning)
  # =========================
  release:
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest

    steps:
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Pull latest image
        run: docker pull $IMAGE:latest

      - name: Tag version
        run: docker tag $IMAGE:latest $IMAGE:${{ github.ref_name }}

      - name: Push version
        run: docker push $IMAGE:${{ github.ref_name }}

  # =========================
  # DEPLOY (ONLY TAG → VPS)
  # =========================
  deploy:
    needs: release
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/e-commerce-BE

            git pull origin main

            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d

            sleep 10

            docker exec e-commerce-backend pnpm prisma migrate deploy

            docker ps
