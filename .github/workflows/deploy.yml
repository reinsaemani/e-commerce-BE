name: Docker CI/CD

on:
  push:
    branches: ["main"]
    tags:
      - "v*"
  workflow_dispatch:

env:
  IMAGE: ${{ secrets.DOCKER_USERNAME }}/ecommerce-backend

# =========================
# BUILD (push ke main)
# =========================
jobs:
  build:
    if: github.ref_type != 'tag'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.prod
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # =========================
  # RELEASE (tag → version)
  # =========================
  release:
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest

    steps:
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Pull latest
        run: docker pull $IMAGE:latest

      - name: Tag version
        run: docker tag $IMAGE:latest $IMAGE:${{ github.ref_name }}

      - name: Push version
        run: docker push $IMAGE:${{ github.ref_name }}

  # =========================
  # DEPLOY (tag → VPS)
  # =========================
  deploy:
    needs: release
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd ~/e-commerce-BE

            git pull origin main

            docker-compose -f docker-compose.prod.yml down
            docker-compose -f docker-compose.prod.yml pull
            docker-compose -f docker-compose.prod.yml up -d

            sleep 10

            docker exec e-commerce-backend sh -c "pnpm prisma migrate deploy"

            docker ps
