name: Kubernetes CI/CD

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  release:
    types: [created]

env:
  IMAGE: ${{ secrets.DOCKER_USERNAME }}/ecommerce-backend

jobs:

# =========================
# BUILD IMAGE
# =========================
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.prod
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

# =========================
# DEPLOY STAGING
# =========================
  deploy-staging:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Set kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config

      - name: Create Namespace
        run: kubectl apply -f k8s/staging/namespace.yaml

      - name: Apply All Staging Resources
        run: kubectl apply -f k8s/staging/

      - name: Update Image Backend
        run: |
          kubectl set image deployment/backend backend=${{ env.IMAGE }}:latest -n staging
          kubectl rollout status deployment/backend -n staging --timeout=180s

# =========================
# DEPLOY PROD
# =========================
  deploy-prod:
    if: github.event_name == 'release'
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Set kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config

      - name: Create Namespace
        run: kubectl apply -f k8s/prod/namespace.yaml

      - name: Apply All Prod Resources
        run: kubectl apply -f k8s/prod/

      - name: Update Image Backend
        run: |
          kubectl set image deployment/backend backend=${{ env.IMAGE }}:latest -n prod
          kubectl rollout status deployment/backend -n prod --timeout=180s