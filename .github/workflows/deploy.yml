name: Docker Tag Deploy

on:
  push:
    tags:
      - "v*"

env:
  IMAGE: ${{ secrets.DOCKER_USERNAME }}/ecommerce-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Image
        run: |
          docker build \
            -t $IMAGE:${{ github.ref_name }} \
            -t $IMAGE:latest \
            -f Dockerfile.prod .

          docker push $IMAGE:${{ github.ref_name }}
          docker push $IMAGE:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/e-commerce-BE

            echo "APP_VERSION=${{ github.ref_name }}" > .env

            docker-compose -f docker-compose.prod.yml down
            docker-compose -f docker-compose.prod.yml pull
            docker-compose -f docker-compose.prod.yml up -d

            sleep 10

            docker exec e-commerce-backend pnpm prisma migrate deploy

            docker ps
